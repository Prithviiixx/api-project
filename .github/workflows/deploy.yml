name: CI/CD — Smart Invoice API

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          # SQS_QUEUE_URL intentionally absent → _send_to_sqs is a no-op in tests
          AWS_REGION: eu-north-1

  # ── 2. Deploy (only on push to main after tests pass) ─────────────────────
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploying Smart Invoice API ==="

            # ── Clone or pull ──────────────────────────────────────────────
            if [ -d "/home/ec2-user/app/.git" ]; then
              cd /home/ec2-user/app
              git pull origin main
            else
              git clone https://github.com/Prithviiixx/api-project.git /home/ec2-user/app
              cd /home/ec2-user/app
            fi

            # ── Python dependencies ────────────────────────────────────────
            pip3 install -r requirements.txt --quiet

            # ── Write .env (from GitHub secret) ───────────────────────────
            cat > /home/ec2-user/app/.env << 'ENVEOF'
            AWS_REGION=eu-north-1
            SQS_QUEUE_URL=${{ secrets.SQS_QUEUE_URL }}
            ENVEOF

            # ── Ensure systemd service file exists ────────────────────────
            sudo tee /etc/systemd/system/invoice-api.service > /dev/null << 'SVCEOF'
            [Unit]
            Description=Smart Billing & Invoice Management API
            After=network.target

            [Service]
            User=ec2-user
            WorkingDirectory=/home/ec2-user/app
            ExecStart=/usr/local/bin/uvicorn main:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5
            EnvironmentFile=/home/ec2-user/app/.env

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            sudo systemctl daemon-reload
            sudo systemctl enable invoice-api

            # ── Start or restart ──────────────────────────────────────────
            if sudo systemctl is-active --quiet invoice-api; then
              sudo systemctl restart invoice-api
            else
              sudo systemctl start invoice-api
            fi

            echo ""
            echo "=== Service status ==="
            sudo systemctl status invoice-api --no-pager -l

            echo ""
            echo "=== Deployment complete ==="
